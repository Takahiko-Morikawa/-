<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ライトテトリス - 修正版</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding-top: 20px;
            /* スマホで画面が動かないように固定 */
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        .game-wrapper {
            position: relative;
            border: 1px solid #444;
            padding: 20px;
            display: flex;
            gap: 20px;
            background-color: #000;
        }

        /* 左側ゲーム画面 */
        #game-container {
            position: relative;
            width: 200px;
            height: 400px;
            border: 2px solid #fff;
            background-color: #000;
        }

        canvas {
            display: block;
        }

        /* 右側パネル */
        .side-panel {
            text-align: right;
            color: #00ffff;
            width: 80px;
        }

        /* 【緑枠の箇所】バージョン表記：右上に移動 */
        .version {
            position: absolute;
            top: 5px;
            right: 10px;
            color: #00ffff;
            font-size: 12px;
            z-index: 100;
        }

        .side-panel h2 { font-size: 14px; margin: 0; }
        .side-panel p { font-size: 20px; margin: 0 0 20px 0; }

        /* 【青枠の箇所】NUKO画像表示ボックス */
        .nuko-box {
            width: 80px;
            height: 80px;
            border: 2px solid #00ffff;
            margin-top: 20px;
            display: none; /* 初期は非表示 */
            justify-content: center;
            align-items: center;
            background-color: #000;
            margin-left: auto;
        }
        
        #nuko-side-image {
            max-width: 100%;
            max-height: 100%;
            display: block;
        }

        /* STARTボタン画面 */
        #start-overlay {
            position: absolute;
            top: 0; left: 0; 
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
            cursor: pointer;
        }

        #start-button-ui {
            border: 2px solid #00ffff;
            padding: 10px 20px;
            color: #00ffff;
            font-weight: bold;
            background: #000;
            pointer-events: none;
        }

        /* 操作ボタン（スマホ連打ズーム防止） */
        .controls {
            margin-top: 20px;
            display: grid;
            grid-template-areas: ". up ." "left down right";
            gap: 15px;
        }

        .btn {
            width: 65px;
            height: 65px;
            border: 2px solid #00ffff;
            background: none;
            color: #00ffff;
            border-radius: 10px;
            font-size: 28px;
            cursor: pointer;
            /* 連続タップでのズームを防止 */
            touch-action: manipulation; 
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <div id="game-container">
            <canvas id="game-canvas" width="200" height="400"></canvas>
            
            <div id="start-overlay" onclick="startGame()">
                <div style="color:#00ffff; margin-bottom:10px; pointer-events:none;">ライト社</div>
                <div style="font-size:24px; margin-bottom:20px; pointer-events:none;">テトリス</div>
                <div id="start-button-ui">START</div>
            </div>
        </div>

        <div class="side-panel">
            <div class="version">Ver 1.0.2</div>
            <h2>SCORE</h2>
            <p id="score">0</p>
            <h2>NEXT</h2>
            <canvas id="next-canvas" width="60" height="60" style="border:1px solid #444; margin-left:auto;"></canvas>
            <div id="nuko-side-box" class="nuko-box">
                <img src="NUKO.png" id="nuko-side-image" alt="NUKO image">
            </div>
        </div>
    </div>

    <div class="controls">
        <button class="btn" style="grid-area: up;" onclick="rotatePiece()">↻</button>
        <button class="btn" style="grid-area: left;" onclick="moveLeft()">←</button>
        <button class="btn" style="grid-area: down;" onclick="moveDownManual()">↓</button>
        <button class="btn" style="grid-area: right;" onclick="moveRight()">→</button>
    </div>

    <script>
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const nextCanvas = document.getElementById('next-canvas');
        const nextCtx = nextCanvas.getContext('2d');
        const scoreDisp = document.getElementById('score');
        const nukoSideBox = document.getElementById('nuko-side-box'); // 取得：青枠ボックス
        const startOverlay = document.getElementById('start-overlay');

        const ROWS = 20;
        const COLS = 10;
        const SIZE = 20;

        let board = Array.from({ length: ROWS }, () => Array(COLS).fill(0));
        let score = 0;
        let gameActive = false;
        let currentPiece = null;
        let nextPiece = null;
        let dropCounter = 0;
        let lastTime = 0;

        const PIECES = [
            [[1, 1, 1, 1]], // I
            [[1, 1], [1, 1]], // O
            [[0, 1, 0], [1, 1, 1]], // T
            [[1, 1, 0], [0, 1, 1]], // S
            [[0, 1, 1], [1, 1, 0]], // Z
            [[1, 0, 0], [1, 1, 1]], // J
            [[0, 0, 1], [1, 1, 1]]  // L
        ];

        function createPiece() {
            if (!nextPiece) nextPiece = PIECES[Math.floor(Math.random() * PIECES.length)];
            currentPiece = {
                shape: nextPiece,
                x: 3,
                y: 0,
                color: '#00ffff'
            };
            nextPiece = PIECES[Math.floor(Math.random() * PIECES.length)];
            drawNext();
            if (collision()) {
                gameActive = false;
                startOverlay.style.display = 'flex';
            }
        }

        function collision() {
            return currentPiece.shape.some((row, dy) => {
                return row.some((value, dx) => {
                    let newX = currentPiece.x + dx;
                    let newY = currentPiece.y + dy;
                    return value && (newX < 0 || newX >= COLS || newY >= ROWS || (newY >= 0 && board[newY][newX]));
                });
            });
        }

        function freeze() {
            currentPiece.shape.forEach((row, dy) => {
                row.forEach((value, dx) => {
                    if (value) board[currentPiece.y + dy][currentPiece.x + dx] = currentPiece.color;
                });
            });
            clearLines();
            createPiece();
        }

        function clearLines() {
            let linesCleared = 0;
            for (let y = ROWS - 1; y >= 0; y--) {
                if (board[y].every(cell => cell !== 0)) {
                    board.splice(y, 1);
                    board.unshift(Array(COLS).fill(0));
                    linesCleared++;
                    y++;
                }
            }
            if (linesCleared > 0) {
                const points = [0, 100, 300, 500, 800];
                score += points[linesCleared];
                scoreDisp.innerText = score;
                
                // 【追加仕様】4行消去（テトリス）時に青枠の中にNUKOを表示
                if (linesCleared === 4) {
                    nukoSideBox.style.display = 'flex'; // 青枠ボックスを表示
                    setTimeout(() => { nukoSideBox.style.display = 'none'; }, 2000);
                }
            }
        }

        function moveDown() {
            currentPiece.y++;
            if (collision()) {
                currentPiece.y--;
                freeze();
            }
            dropCounter = 0;
        }

        function rotatePiece() {
            if (!gameActive) return;
            const original = currentPiece.shape;
            currentPiece.shape = currentPiece.shape[0].map((_, i) => currentPiece.shape.map(row => row[i]).reverse());
            if (collision()) currentPiece.shape = original;
            draw();
        }

        function moveLeft() { if (!gameActive) return; currentPiece.x--; if(collision()) currentPiece.x++; draw(); }
        function moveRight() { if (!gameActive) return; currentPiece.x++; if(collision()) currentPiece.x--; draw(); }
        function moveDownManual() { if (!gameActive) return; moveDown(); draw(); }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            board.forEach((row, y) => {
                row.forEach((cell, x) => {
                    if (cell) {
                        ctx.fillStyle = cell;
                        ctx.fillRect(x * SIZE, y * SIZE, SIZE - 1, SIZE - 1);
                    }
                });
            });
            if (currentPiece) {
                ctx.fillStyle = currentPiece.color;
                currentPiece.shape.forEach((row, dy) => {
                    row.forEach((value, dx) => {
                        if (value) ctx.fillRect((currentPiece.x + dx) * SIZE, (currentPiece.y + dy) * SIZE, SIZE - 1, SIZE - 1);
                    });
                });
            }
        }

        function drawNext() {
            nextCtx.clearRect(0, 0, 60, 60);
            nextCtx.fillStyle = '#00ffff';
            nextPiece.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value) nextCtx.fillRect(x * 15 + 10, y * 15 + 10, 14, 14);
                });
            });
        }

        function update(time = 0) {
            if (!gameActive) return;
            const deltaTime = time - lastTime;
            lastTime = time;
            dropCounter += deltaTime;
            if (dropCounter > 1000) {
                moveDown();
            }
            draw();
            requestAnimationFrame(update);
        }

        // STARTボタンを押した時の関数
        function startGame() {
            board = Array.from({ length: ROWS }, () => Array(COLS).fill(0));
            score = 0;
            scoreDisp.innerText = score;
            gameActive = true;
            startOverlay.style.display = 'none';
            createPiece();
            update();
        }
    </script>
</body>
</html>
