<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ライトテトリス</title>
    <style>
        /* --- CSSセクション --- */
        body {
            background-color: #000;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            touch-action: none; /* 画面全体の不要な挙動を制限 */
        }

        /* ゲーム画面の外枠 */
        .game-container {
            position: relative;
            border: 2px solid #333;
            padding: 20px;
            margin-top: 20px;
        }

        /* 操作ボタンのスタイル */
        .controls {
            display: grid;
            grid-template-areas: 
                ". up ."
                "left down right";
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            width: 60px;
            height: 60px;
            border: 2px solid #00ffff;
            background: none;
            color: #00ffff;
            border-radius: 10px;
            font-size: 24px;
            cursor: pointer;
            
            /* 【修正1】連続タップによるズームを無効化 */
            touch-action: manipulation; 
            
            /* タップした時の青い枠線を消す（スマホ用） */
            -webkit-tap-highlight-color: transparent;
        }

        /* 【修正2】Ver表記をPC・スマホ両方で常に出す */
        .version-info {
            position: absolute;
            top: 10px;
            left: 20px;
            font-size: 12px;
            color: #00ffff;
            opacity: 0.7;
            display: block !important; /* 強制的に表示 */
        }

        /* キャラクター（NUKO）の配置 */
        .character-nuko {
            width: 80px;
            height: auto;
            margin-bottom: 10px;
        }

        /* 既存のテトリス枠などのスタイル（適宜調整してください） */
        #game-canvas {
            border: 1px solid #fff;
        }
    </style>
</head>
<body>

    <img src="NUKO.png" alt="NUKO" class="character-nuko">

    <div class="game-container">
        <div class="version-info">Ver 1.0.2</div>
        
        <div style="text-align: right; color: #00ffff;">
            SCORE<br>
            <span style="font-size: 24px;">0</span>
        </div>

        <canvas id="game-canvas" width="200" height="400"></canvas>
        
        <div class="controls">
            <button class="btn" style="grid-area: up;">↻</button>
            <button class="btn" style="grid-area: left;">←</button>
            <button class="btn" style="grid-area: down;">↓</button>
            <button class="btn" style="grid-area: right;">→</button>
        </div>
    </div>

</body>
</html>
