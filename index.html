<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ライトテトリス - 修正版</title>
    <style>
        /* --- 元のレイアウトを再現するCSS --- */
        body {
            background-color: #000;
            color: #fff;
            font-family: sans-serif;
            /* 中央配置ではなく、上部から配置 */
            display: flex;
            flex-direction: column;
            align-items: center; /* 横方向の中央配置は維持 */
            margin: 0;
            padding-top: 20px;
            touch-action: none; /* 画面全体の不要な挙動を制限 */
        }

        /* ゲーム画面全体のコンテナ */
        .main-game-area {
            width: 300px; /* 元のスクリーンショットから推測 */
            margin: 0 auto;
        }

        /* キャラクター（NUKO）の配置 */
        .character-nuko {
            display: block;
            width: 80px; /* 元の画像サイズから推測 */
            height: auto;
            margin: 0 auto 10px auto; /* 中央配置、下マージン */
        }

        /* ゲーム枠とスコアエリアを並べるコンテナ */
        .game-board-and-score {
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            width: 100%;
            border: 2px solid #333; /* 元のスクリーンショットの外枠 */
            padding: 10px;
            box-sizing: border-box;
        }

        /* ゲーム枠（左側） */
        .game-canvas-area {
            width: 200px;
            height: 400px;
            border: 1px solid #fff;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* ゲームキャンバス（JavaScriptで描画される部分） */
        #game-canvas {
            width: 100%;
            height: 100%;
        }

        /* STARTボタン（JavaScriptで制御される） */
        #start-button {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border: 2px solid #00ffff;
            border-radius: 5px;
            color: #fff;
            text-align: center;
            cursor: pointer;
        }

        #start-button h1 {
            margin: 0;
            font-size: 20px;
            color: #00ffff;
        }

        #start-button p {
            margin: 5px 0 0 0;
            font-size: 14px;
            color: #fff;
        }

        /* スコアエリア（右側） */
        .score-area {
            width: 80px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: flex-end;
            color: #00ffff;
        }

        .score-area h2 {
            margin: 0;
            font-size: 14px;
        }

        .score-area p {
            margin: 0;
            font-size: 24px;
        }

        .score-area .next-block {
            width: 60px;
            height: 60px;
            border: 2px solid #333;
            margin-top: 10px;
            box-sizing: border-box;
        }

        /* 【修正2】Ver表記をPC・スマホ両方で常に出す */
        .version-info {
            font-size: 10px;
            opacity: 0.7;
            margin-top: 10px;
            display: block; /* 常に表示 */
        }

        /* 操作ボタンのコンテナ（下部） */
        .controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 20px;
        }

        .control-row {
            display: flex;
            flex-direction: row;
            gap: 10px;
        }

        .btn {
            width: 50px;
            height: 50px;
            border: 2px solid #00ffff;
            background: none;
            color: #00ffff;
            border-radius: 5px;
            font-size: 20px;
            cursor: pointer;
            /* 【修正1】連続タップによるズームを無効化 */
            touch-action: manipulation; 
            /* タップした時の青い枠線を消す（スマホ用） */
            -webkit-tap-highlight-color: transparent;
        }

        .btn.up {
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <img src="NUKO.png" alt="NUKO" class="character-nuko">

    <div class="main-game-area">
        <div class="game-board-and-score">
            <div class="game-canvas-area">
                <canvas id="game-canvas"></canvas>
                <div id="start-button">
                    <h1>テトリス</h1>
                    <p>START</p>
                </div>
            </div>

            <div class="score-area">
                <h2>SCORE</h2>
                <p>0</p>
                <h2>NEXT</h2>
                <div class="next-block"></div>
                <div class="version-info">Ver 1.0.2</div>
            </div>
        </div>

        <div class="controls">
            <button class="btn up">↻</button>
            <div class="control-row">
                <button class="btn left">←</button>
                <button class="btn down">↓</button>
                <button class="btn right">→</button>
            </div>
        </div>
    </div>

    <script>
        // これはプレースホルダーです。ご自身の元のコードと差し替えてください。
        // （例）const startButton = document.getElementById('start-button');
        // （例）startButton.addEventListener('click', ... );
    </script>
</body>
</html>
